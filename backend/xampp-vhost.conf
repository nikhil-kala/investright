
# InvestRight API — XAMPP Apache Virtual Host
# Include this from httpd-vhosts.conf or paste into that file, then restart Apache.

<VirtualHost *:80>
    ServerName investright-api.local
    DocumentRoot "C:/xampp/htdocs/investright-api/public"

    <Directory "C:/xampp/htdocs/investright-api/public">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog "logs/investright-api-error.log"
    CustomLog "logs/investright-api-access.log" common
</VirtualHost>
